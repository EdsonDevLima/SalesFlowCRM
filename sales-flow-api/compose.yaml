version: '3.9'

services:
  db:
    image: mysql:8.0
    container_name: mysql_salesflow
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME}
    ports:
      - "${DATABASE_PORT}:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
